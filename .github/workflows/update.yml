name: Daily Update

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update data
        run: |
          echo '{
            "report_date": "AUTO UPDATE",
            "summary": {
              "ytd_po": 9999999,
              "ytd_sales": 8888888,
              "current_month_sales_total": 777777
            }
          }' > public/data.json

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add public/data.json
          git commit -m "auto update" || echo "no change"
          git push
